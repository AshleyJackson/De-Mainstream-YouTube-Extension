name: PR Assistant

on: 
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-and-fix:
    if: >-
      !contains(github.event.pull_request.title, '[ai-fix]') &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'ai-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if triggered by AI fix merge
        id: ai-check
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          LAST_COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          if [[ "${LAST_COMMIT_MSG}" == *"[ai-fix]"* ]] || [[ "${LAST_COMMIT_MSG}" == *"ai-fix/"* ]] || [[ "${LAST_COMMIT_AUTHOR}" == "github-actions[bot]" ]]; then
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping: last commit is from AI fix merge (message: ${LAST_COMMIT_MSG}, author: ${LAST_COMMIT_AUTHOR})"
          else
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup droid CLI
        if: steps.ai-check.outputs.should_run == 'true'
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Analyze and apply fixes
        if: steps.ai-check.outputs.should_run == 'true'
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_changes.diff
          git log origin/${{ github.base_ref }}...HEAD --pretty=format:"%s%n%b%n---" > commit_messages.txt

          PROMPT=$(cat .github/prompt.txt)

          cat pr_changes.diff commit_messages.txt | droid exec -m gpt-5.2-codex -r high --auto high "$PROMPT"

      - name: Create fix PR if changes exist
        if: steps.ai-check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          FIX_BRANCH="ai-fix/${PR_BRANCH}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Read the AI-generated summary if it exists, then remove it from the commit
          FIX_SUMMARY=""
          if [[ -f ai_fix_summary.md ]]; then
            FIX_SUMMARY=$(cat ai_fix_summary.md)
            rm -f ai_fix_summary.md
          fi

          PR_BODY="Automated fixes generated by AI review of PR #${PR_NUMBER}. Merge this into your branch to apply the suggested changes."
          if [[ -n "$FIX_SUMMARY" ]]; then
            PR_BODY="${PR_BODY}

          ## Changes

          ${FIX_SUMMARY}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$FIX_BRANCH"
          git add -A
          git commit -m "[ai-fix] Automated fixes for PR #${PR_NUMBER}"
          git push origin "$FIX_BRANCH" --force

          EXISTING_PR=$(gh pr list --head "$FIX_BRANCH" --base "$PR_BRANCH" --json number --jq '.[0].number // empty')

          ORIGINAL_AUTHOR="${{ github.event.pull_request.user.login }}"

          if [ -n "$EXISTING_PR" ]; then
            echo "Fix PR #${EXISTING_PR} already exists, updated with force push."
            FIX_PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            gh pr edit "$EXISTING_PR" --add-reviewer "$ORIGINAL_AUTHOR"
          else
            FIX_PR_URL=$(gh pr create \
              --title "[ai-fix] Automated fixes for PR #${PR_NUMBER}" \
              --body "$PR_BODY" \
              --base "$PR_BRANCH" \
              --head "$FIX_BRANCH" \
              --label "ai-fix" \
              --reviewer "$ORIGINAL_AUTHOR")
          fi

          gh pr comment "$PR_NUMBER" --body "AI review found improvements and opened a fix PR: ${FIX_PR_URL}

          Merge that PR into this branch to apply the changes, or close it to discard them."
