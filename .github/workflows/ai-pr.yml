name: PR Assistant

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-and-fix:
    if: >-
      !contains(github.event.pull_request.title, '[ai-fix]') &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      !contains(github.event.pull_request.labels.*.name, 'ai-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR head
        run: |
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF"
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr-head"
          git checkout pr-head

      - name: Check if triggered by AI fix merge
        id: ai-check
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          LAST_COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          if [[ "${LAST_COMMIT_MSG}" == *"[ai-fix]"* ]] || [[ "${LAST_COMMIT_MSG}" == *"ai-fix/"* ]] || [[ "${LAST_COMMIT_AUTHOR}" == "github-actions[bot]" ]]; then
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping: last commit is from AI fix merge (message: ${LAST_COMMIT_MSG}, author: ${LAST_COMMIT_AUTHOR})"
          else
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup OpenClaude CLI
        if: steps.ai-check.outputs.should_run == 'true'
        run: |
          npm install -g @gitlawb/openclaude@latest

      - name: Analyze and apply fixes
        if: steps.ai-check.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_changes.diff
          git log origin/${{ github.base_ref }}...HEAD --pretty=format:"%s%n%b%n---" > commit_messages.txt

          PROMPT=$(cat .github/prompt.txt)

          {
            echo "Here are the PR changes and commit context:"
            echo ""
            echo "=== Diff ==="
            cat pr_changes.diff
            echo ""
            echo "=== Commit Messages ==="
            cat commit_messages.txt
          } | openclaude -p "$PROMPT" --print --model deepseek/deepseek-v4-flash --provider openai

      - name: Create fix PR if changes exist
        if: steps.ai-check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          PR_NUMBER="${{ github.event.pull_request.number }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          HEAD_OWNER="${{ github.event.pull_request.head.repo.owner.login }}"
          IS_FORK="${{ github.event.pull_request.head.repo.fork }}"
          REPO="${{ github.repository }}"

          # Read the AI-generated summary if it exists, then remove it from the commit
          FIX_SUMMARY=""
          if [[ -f ai_fix_summary.md ]]; then
            FIX_SUMMARY=$(cat ai_fix_summary.md)
            rm -f ai_fix_summary.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ "$IS_FORK" == "true" ]]; then
            # Fork PR: push fix branch to base repo, instruct contributor to merge
            FIX_BRANCH="ai-fix/pr-$PR_NUMBER"
            git checkout -b "$FIX_BRANCH"
            git add -A
            git commit -m "[ai-fix] Automated fixes for PR #${PR_NUMBER}"
            git push origin "$FIX_BRANCH" --force

            COMMENT_BODY="## AI Review Found Improvements

          A fix branch is available in the upstream repo. To apply these changes to your PR branch, run:

          \`\`\`bash
          git remote add upstream https://github.com/${REPO}.git
          git fetch upstream ${FIX_BRANCH}
          git merge upstream/${FIX_BRANCH}
          git push origin ${HEAD_REF}
          \`\`\`"

            if [[ -n "$FIX_SUMMARY" ]]; then
              COMMENT_BODY="${COMMENT_BODY}

          <details>
          <summary>Changes</summary>

          ${FIX_SUMMARY}
          </details>"
            fi

            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"

          else
            # Same-repo PR: push fix branch and create fix PR
            FIX_BRANCH="ai-fix/${HEAD_REF}"
            PR_BODY="Automated fixes generated by AI review of PR #${PR_NUMBER}. Merge this into your branch to apply the suggested changes."
            if [[ -n "$FIX_SUMMARY" ]]; then
              PR_BODY="${PR_BODY}

          ## Changes

          ${FIX_SUMMARY}"
            fi

            git checkout -b "$FIX_BRANCH"
            git add -A
            git commit -m "[ai-fix] Automated fixes for PR #${PR_NUMBER}"
            git push origin "$FIX_BRANCH" --force

            EXISTING_PR=$(gh pr list --head "$FIX_BRANCH" --base "$HEAD_REF" --json number --jq '.[0].number // empty')

            if [ -n "$EXISTING_PR" ]; then
              echo "Fix PR #${EXISTING_PR} already exists, updated with force push."
              FIX_PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')
              gh pr edit "$EXISTING_PR" --body "$PR_BODY"
              gh pr edit "$EXISTING_PR" --add-reviewer "$HEAD_OWNER"
            else
              FIX_PR_URL=$(gh pr create \
                --title "[ai-fix] Automated fixes for PR #${PR_NUMBER}" \
                --body "$PR_BODY" \
                --base "$HEAD_REF" \
                --head "$FIX_BRANCH" \
                --label "ai-fix" \
                --reviewer "$HEAD_OWNER")
            fi

            gh pr comment "$PR_NUMBER" --body "AI review found improvements and opened a fix PR: ${FIX_PR_URL}

          Merge that PR into this branch to apply the changes, or close it to discard them."
          fi
